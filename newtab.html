<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>hamzeh's Startpage</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Poppins:wght@300;500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="header-section">
    <h1 id="clock">00:00</h1>
    <h2>Good day</h2>
    <div class="weather" id="weather">Loading weather...</div>
  </div>

  <!-- Center Corner Utility Area -->
  <div class="center-utility-container">
    <!-- Timer Module -->
    <div class="utility-card timer-card">
      <h3>Timer <span class="tip">(Double-click numbers to edit)</span></h3>
      <div id="timer-display" contenteditable="true" spellcheck="false">05:00</div>
      <div class="timer-controls">
        <button id="start-timer">Start</button>
        <button id="pause-timer">Pause</button>
        <button id="reset-timer">Reset</button>
      </div>
    </div>

    <!-- To-Do Module -->
    <div class="utility-card todo-card">
      <h3>To-Do</h3>
      <div class="todo-input-row">
        <input type="text" id="todo-input" placeholder="Add new task..." />
        <button id="add-todo-btn">+</button>
      </div>
      <ul id="todo-list"></ul>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Start</h3>
      <a href="https://github.com/">github</a>
      <a href="https://gemini.google.com">Gemini</a>
    </div>
    <div class="card">
      <h3>Media</h3>
      <a href="https://youtube.com">YouTube</a>
      <a href="https://www.instagram.com/">instagram</a>
      <a href="https://mail.google.com/mail/u/0/">gmail</a>
      <a href="https://www.pinterest.com/">Pinterest</a>
    </div>
    <div class="card">
      <h3>game</h3>
      <a href="https://lichess.org/">lichess</a>
      <a href="https://lichess.org/">chess.com</a>
      <a href="https://sudoku.com/">sudoku</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
